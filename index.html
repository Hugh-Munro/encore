<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:       #1a1a1a;
      --muted:     #6b6b6b;
      --rule:      #e0dbd3;
      --bg:        #f7f4ef;
      --card:      #ffffff;
      --accent:    #2e5c3e;
      --accent-lt: #e8f0eb;
      --tab-h:     52px;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 2.5rem 2.5rem 1.25rem;
      border-bottom: 1px solid var(--rule);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    header p {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.875rem;
      letter-spacing: 0.02em;
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 2rem;
      margin-top: 1rem;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    /* ── Tabs + toolbar ── */
    .tabs-wrap {
      border-bottom: 1px solid var(--rule);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tabs-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      height: var(--tab-h);
      padding: 0 1.25rem;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
    }
    .view-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .view-btn:hover { color: var(--ink); }
    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2.5rem 4rem;
    }

    /* ── Toolbar row (search + count) ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: var(--card);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    .count-label {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════════
       CARD GRID VIEW
    ══════════════════════════════════════════ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s, transform 0.15s;
      cursor: default;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 3/2;
      background: linear-gradient(145deg, #e8f0eb 0%, #d4e3d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0.6;
    }
    .card-img svg {
      width: 40px;
      height: 40px;
    }
    .card-body {
      padding: 0.85rem 1rem;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      /* clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-creator {
      margin-top: 0.3rem;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--accent-lt);
      color: var(--accent);
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ══════════════════════════════════════════
       TABLE VIEW
    ══════════════════════════════════════════ */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--ink); }
    thead th .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    thead th.sort-asc  .sort-arrow::after { content: '▲'; opacity: 1; }
    thead th.sort-desc .sort-arrow::after { content: '▼'; opacity: 1; }
    thead th:not(.sort-asc):not(.sort-desc) .sort-arrow::after { content: '⬍'; }
    tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--accent-lt); }
    td { padding: 0.75rem 1rem; font-size: 0.9rem; vertical-align: middle; }
    td:first-child { font-weight: 500; }
    td.creator { color: var(--muted); }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--accent-lt);
      color: var(--accent);
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.03em;
    }

    /* ── Empty / hidden ── */
    .empty {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1rem; }
      .header-inner { max-width: 100%; }
      main { padding: 1rem 1rem 3rem; max-width: 100%; }
      .tabs-inner { padding: 0 1rem; }
      .tab { padding: 0 0.75rem; }
      .stats { gap: 1.25rem; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.875rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>The Collection</h1>
    <p>Books, films &amp; music from home</p>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="stat-books">—</span><span class="stat-label">Books</span></div>
      <div class="stat"><span class="stat-num" id="stat-dvds">—</span><span class="stat-label">Films</span></div>
      <div class="stat"><span class="stat-num" id="stat-cds">—</span><span class="stat-label">Albums</span></div>
    </div>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs-inner">
    <div class="tabs">
      <button class="tab active" data-tab="books">Books</button>
      <button class="tab" data-tab="dvds">Films</button>
      <button class="tab" data-tab="cds">Music</button>
    </div>
    <div class="view-toggle">
      <!-- Grid icon -->
      <button class="view-btn active" id="btn-grid" title="Card view" aria-label="Card view">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="8.5" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="1" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <!-- List icon -->
      <button class="view-btn" id="btn-list" title="List view" aria-label="List view">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="2.5" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="6.75" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="11" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="Search titles…" autocomplete="off" />
    </div>
    <span class="count-label" id="count-label"></span>
  </div>

  <!-- Card grid -->
  <div id="grid-view" class="card-grid"></div>

  <!-- Table view -->
  <div id="list-view" class="table-wrap hidden">
    <table id="main-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<script>
  // ── SVG icons per tab ────────────────────────────────────────────────────
  const ICONS = {
    books: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="6" width="22" height="36" rx="2" stroke="currentColor" stroke-width="2.5" fill="none"/>
      <path d="M10 10 C10 10 16 8 24 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="17" x2="28" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="22" x2="28" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="27" x2="22" y2="27" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <rect x="8" y="6" width="2" height="36" rx="1" fill="currentColor" opacity="0.4"/>
    </svg>`,
    dvds: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="6" width="32" height="36" rx="2" stroke="currentColor" stroke-width="2.5" fill="none"/>
      <polygon points="19,16 33,24 19,32" fill="currentColor" opacity="0.5"/>
    </svg>`,
    cds: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="16" stroke="currentColor" stroke-width="2.5" fill="none"/>
      <circle cx="24" cy="24" r="4" fill="currentColor" opacity="0.4"/>
      <line x1="24" y1="8" x2="24" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="36" x2="24" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="24" x2="12" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="36" y1="24" x2="40" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>`,
  };

  // ── Config ───────────────────────────────────────────────────────────────
  const TABS = {
    books: { label: 'Books',  file: 'data/books.csv', cols: ['title','author'],   headers: ['Title','Author']   },
    dvds:  { label: 'Films',  file: 'data/dvds.csv',  cols: ['title','director'], headers: ['Title','Director'] },
    cds:   { label: 'Music',  file: 'data/cds.csv',   cols: ['title','artist'],   headers: ['Title','Artist']   },
  };

  // ── State ────────────────────────────────────────────────────────────────
  let cache     = {};
  let activeTab = 'books';
  let sortCol   = 0;
  let sortDir   = 'asc';
  let query     = '';
  let viewMode  = 'grid'; // 'grid' | 'list'

  // ── CSV parser ───────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const vals = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; continue; }
        if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; continue; }
        cur += ch;
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] ?? '');
      return obj;
    }).filter(r => r[headers[0]]);
  }

  // ── Title cleaner ────────────────────────────────────────────────────────
  function parseTitle(raw) {
    const match = raw.match(/^(.*?)\s*\(x(\d+)\)\s*$/i);
    if (match) return { display: match[1].trim(), copies: parseInt(match[2]) };
    return { display: raw, copies: 1 };
  }

  // ── Fetch + cache ────────────────────────────────────────────────────────
  async function loadTab(tab) {
    if (cache[tab]) return;
    try {
      const res = await fetch(TABS[tab].file);
      if (!res.ok) throw new Error(res.status);
      cache[tab] = parseCSV(await res.text());
    } catch (e) {
      cache[tab] = [];
      console.warn(`Could not load ${TABS[tab].file}:`, e);
    }
  }

  // ── Shared: filter + sort ────────────────────────────────────────────────
  function getRows() {
    const cfg  = TABS[activeTab];
    const data = cache[activeTab] ?? [];
    const q    = query.toLowerCase();
    let rows   = q
      ? data.filter(r => cfg.cols.some(c => (r[c] || '').toLowerCase().includes(q)))
      : data;
    const col  = cfg.cols[sortCol];
    return [...rows].sort((a, b) => {
      const av = (a[col] || '').toLowerCase();
      const bv = (b[col] || '').toLowerCase();
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  // ── Render grid ──────────────────────────────────────────────────────────
  function renderGrid(rows) {
    const cfg  = TABS[activeTab];
    const icon = ICONS[activeTab];
    const grid = document.getElementById('grid-view');

    if (!rows.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">${
        query ? `No results for "${query}"` : `Nothing here yet — add entries to ${cfg.file}`
      }</div>`;
      return;
    }

    grid.innerHTML = rows.map(r => {
      const { display, copies } = parseTitle(r[cfg.cols[0]] || '');
      const badge   = copies > 1 ? `<span class="card-badge">×${copies}</span>` : '';
      const creator = r[cfg.cols[1]] || '';
      const creatorHtml = (!creator || creator.toLowerCase() === 'n/a')
        ? '' : `<div class="card-creator">${creator}</div>`;
      return `
        <div class="card">
          <div class="card-img">${icon}</div>
          <div class="card-body">
            <div class="card-title">${display}${badge}</div>
            ${creatorHtml}
          </div>
        </div>`;
    }).join('');
  }

  // ── Render table ─────────────────────────────────────────────────────────
  function renderTable(rows) {
    const cfg  = TABS[activeTab];
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');

    head.innerHTML = '<tr>' + cfg.headers.map((h, i) => `
      <th data-col="${i}" class="${sortCol === i ? 'sort-' + sortDir : ''}">
        ${h}<span class="sort-arrow"></span>
      </th>`).join('') + '</tr>';

    head.querySelectorAll('th').forEach(th => {
      th.addEventListener('click', () => {
        const ci = parseInt(th.dataset.col);
        if (sortCol === ci) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = ci; sortDir = 'asc'; }
        render();
      });
    });

    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="${cfg.cols.length}" class="empty">${
        query ? `No results for "${query}"` : `Nothing here yet — add entries to ${cfg.file}`
      }</td></tr>`;
    } else {
      body.innerHTML = rows.map(r => {
        const { display, copies } = parseTitle(r[cfg.cols[0]] || '');
        const badge = copies > 1 ? `<span class="badge">×${copies}</span>` : '';
        const creator = r[cfg.cols[1]] || '';
        const creatorCell = (!creator || creator.toLowerCase() === 'n/a')
          ? '<td class="creator">—</td>'
          : `<td class="creator">${creator}</td>`;
        return `<tr><td>${display}${badge}</td>${creatorCell}</tr>`;
      }).join('');
    }
  }

  // ── Master render ─────────────────────────────────────────────────────────
  function render() {
    const rows = getRows();
    const data = cache[activeTab] ?? [];
    const cfg  = TABS[activeTab];

    const gridEl = document.getElementById('grid-view');
    const listEl = document.getElementById('list-view');

    if (viewMode === 'grid') {
      gridEl.classList.remove('hidden');
      listEl.classList.add('hidden');
      renderGrid(rows);
    } else {
      listEl.classList.remove('hidden');
      gridEl.classList.add('hidden');
      renderTable(rows);
    }

    document.getElementById('count-label').textContent =
      rows.length === data.length
        ? `${data.length} ${cfg.label.toLowerCase()}`
        : `${rows.length} of ${data.length} ${cfg.label.toLowerCase()}`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────
  document.getElementById('btn-grid').addEventListener('click', () => {
    viewMode = 'grid';
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-list').classList.remove('active');
    render();
  });
  document.getElementById('btn-list').addEventListener('click', () => {
    viewMode = 'list';
    document.getElementById('btn-list').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
    render();
  });

  // ── Tabs ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      sortCol = 0; sortDir = 'asc';
      document.getElementById('search').value = '';
      query = '';
      await loadTab(activeTab);
      render();
    });
  });

  // ── Search ────────────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    render();
  });

  // ── Stats ─────────────────────────────────────────────────────────────────
  async function loadStats() {
    for (const [key] of Object.entries(TABS)) {
      await loadTab(key);
      document.getElementById('stat-' + key).textContent = cache[key].length;
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    await loadTab('books');
    render();
    loadStats();
  })();
</script>
</body>
</html>
